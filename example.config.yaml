# sidekick.config.yaml — non-secret deployment configuration.
#
# Copy this file to `sidekick.config.yaml` (gitignored) and edit to
# customize your sidekick instance. Secrets (API keys, bearer tokens)
# stay in `.env`.
#
# Every value here can also be overridden by the environment variable
# named in the comment — env vars win, config file is the default.
# Omit a key to fall back to env var then to hardcoded default.

# ── Branding ──────────────────────────────────────────────────────────
app:
  # SIDEKICK_APP_NAME
  name: SideKick
  # SIDEKICK_APP_SUBTITLE
  subtitle: Agent Portal
  # SIDEKICK_AGENT_LABEL — shown in agent bubbles + lockscreen metadata
  agent_label: Clawdian
  # SIDEKICK_THEME_PRIMARY — any CSS color; empty = stylesheet default (sage).
  # Useful for rebrands: '#7a9a7a', 'hsl(210 40% 50%)', 'dodgerblue', etc.
  theme_primary: ~

# ── Backend selection ─────────────────────────────────────────────────
# Sidekick has a single backend: the proxy's /api/sidekick/* surface,
# which talks to ANY agent that speaks the abstract agent contract
# (HTTP+SSE, OAI Responses-shaped — see docs/ABSTRACT_AGENT_PROTOCOL.md).
# The backend.type key is reserved for future per-deployment tuning;
# 'hermes-gateway' is the only value that does anything today.
backend:
  type: hermes-gateway

# ── Model picker ──────────────────────────────────────────────────────
models:
  # SIDEKICK_PREFERRED_MODELS — glob patterns (comma-sep via env, list here).
  # When set, the Settings → Model picker shows ONLY these. Clear the list
  # to let the full openrouter catalog through.
  preferred:
    - anthropic/*
    - google/gemini-*
    - google/gemma-*
    - openai/gpt-5*
    - deepseek/*

# ── STT keyterm biasing ───────────────────────────────────────────────
# Deepgram keyterm hints are managed PER USER via Settings → STT keyterms
# in the PWA. The list lives in the browser's IndexedDB, not in this file.
# `default_stt_keyterms.txt` (next to server.ts) is the seed list copied
# into IDB on first boot — edit that file to change defaults for fresh
# installs. This `stt:` section is no longer read.

# ── Ambient weather widget ────────────────────────────────────────────
weather:
  # SIDEKICK_WEATHER_LAT + _LON — default coords for the corner widget.
  # Empty = fallback to London (51.5074, -0.1278).
  lat: ~
  lon: ~

# ── Server ────────────────────────────────────────────────────────────
server:
  # PORT
  port: 3001
  # HOST (default 0.0.0.0 — bind all interfaces)
  host: ~
  # SIDEKICK_DISABLE_SCREENSHOT — any non-empty value disables /screenshot
  disable_screenshot: false
